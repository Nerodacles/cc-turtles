<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Turtle Swarm</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🐢 Turtle Swarm</h1>
    <span id="conn" class="pill off">connecting…</span>
    <span id="count" class="pill">0 turtles</span>
    <span id="ver" class="pill">latest ?</span>
    <span id="zones" class="pill">0 zones done</span>
    <button id="unlockBtn" class="muted" hidden>🔒 unlock</button>
    <div class="cmds" id="cmds" hidden>
      <button data-cmd="start">▶ start</button>
      <button data-cmd="pause">⏸ pause</button>
      <button data-cmd="resume">⏵ resume</button>
      <button data-cmd="stop" class="warn">⏏ home</button>
      <button data-cmd="update" class="muted">⟳ update</button>
      <button id="entryBtn" class="muted">⛏ entry…</button>
      <button id="resetZonesBtn" class="warn" title="mark all zones unmined">♻ zones</button>
      <button id="lockBtn" class="muted" title="forget the key">🔓</button>
    </div>
  </header>

  <main>
    <section id="mapWrap">
      <canvas id="map"></canvas>
      <div id="legend"></div>
      <div id="maphint">top-down · X→ · Z↓ · scroll to zoom · drag to pan</div>
      <div id="mapOverlay">
        <div id="compass">
          <svg width="36" height="36" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="17" fill="none" stroke="#2b3340" stroke-width="1.5"/>
            <polygon points="18,4 15,18 18,15 21,18" fill="#f85149" opacity="0.9"/>
            <polygon points="18,32 15,18 18,21 21,18" fill="#8b97a7" opacity="0.7"/>
            <text x="18" y="11" text-anchor="middle" fill="#f85149" font-size="7" font-family="ui-monospace,monospace" font-weight="700">N</text>
            <text x="18" y="28.5" text-anchor="middle" fill="#8b97a7" font-size="6" font-family="ui-monospace,monospace">S</text>
            <text x="29" y="20" text-anchor="middle" fill="#8b97a7" font-size="6" font-family="ui-monospace,monospace">E</text>
            <text x="7" y="20" text-anchor="middle" fill="#8b97a7" font-size="6" font-family="ui-monospace,monospace">W</text>
          </svg>
        </div>
        <div id="scalebar">
          <div id="scalebarLine"></div>
          <div id="scalebarLabel">0</div>
        </div>
      </div>
    </section>
    <section id="list"></section>

    <aside id="detail" hidden>
      <header>
        <b id="dName">turtle</b>
        <button id="dClose">✕</button>
      </header>
      <div class="dcmds" id="dcmds" hidden>
        <button data-tcmd="pause">⏸ pause</button>
        <button data-tcmd="resume">⏵ resume</button>
        <button data-tcmd="stop" class="warn">⏏ home</button>
        <button data-tcmd="update" class="muted">⟳ update</button>
      </div>
      <pre id="dLog"></pre>
    </aside>
  </main>

  <dialog id="entryDlg">
    <form method="dialog">
      <h3>Set entry point</h3>
      <p>Miners enter (and exit) the mine at this block. Applies next mission.</p>
      <label>X <input id="ex" type="number" required></label>
      <label>Y <input id="ey" type="number" required></label>
      <label>Z <input id="ez" type="number" required></label>
      <menu>
        <button value="cancel">cancel</button>
        <button id="entryOk" value="ok" class="primary">set</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
