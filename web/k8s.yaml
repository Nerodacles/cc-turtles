# Dashboard on the cluster. Build/push the image first, e.g.:
#   docker build -t <registry>/cc-turtles-dashboard:latest web/
#   docker push  <registry>/cc-turtles-dashboard:latest
# Then set the image below and apply. Traefik IngressRoute included;
# adapt host/entryPoints/cert to your setup (or expose via Tailscale).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is RWO, so the old pod must
  # release the volume BEFORE the new one mounts it. A rolling surge would
  # start the new pod first and deadlock on a Multi-Attach error whenever
  # it lands on a different node than the old pod.
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: cc-turtles-dashboard }
  template:
    metadata:
      labels: { app: cc-turtles-dashboard }
    spec:
      containers:
        - name: dashboard
          image: REGISTRY/cc-turtles-dashboard:latest
          ports: [{ containerPort: 8080 }]
          env:
            - { name: PORT, value: "8080" }
            - { name: STALE_MS, value: "20000" }
            # Command gate: browsers must enter this key to issue
            # commands. Sourced from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-cmdkey \
            #     --from-literal=key=YOUR-KEY
            # Absent secret = no gate (optional: true).
            - name: CMD_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-cmdkey
                  key: key
                  optional: true
            # Read-only API gate: GET /api/state requires this token as
            # Bearer or ?key=. Sourced from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-readkey \
            #     --from-literal=key=YOUR-READ-KEY
            # Absent secret = read API treated as disabled (optional: true).
            - name: READ_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-readkey
                  key: key
                  optional: true
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 3
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 250m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  selector: { app: cc-turtles-dashboard }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
---
# Traefik IngressRoute. Both entrypoints: behind Cloudflare the
# WebSocket origin-pull is uncacheable and rides 443 (websecure), so
# the route must exist there too (a web-only route 404s the WS upgrade
# while the cached HTML still loads). tls:{} = Traefik default cert
# (fine with Cloudflare "Full"); use a certResolver for a real cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  entryPoints: [web, websecure]
  routes:
    - match: Host(`turtles.infra.com.do`)
      kind: Rule
      services:
        - name: cc-turtles-dashboard
          port: 80
  tls: {}
