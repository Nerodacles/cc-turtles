# No-build deploy (the live manifest): a node:22-alpine pod clones the public
# repo and runs the server (no registry/docker needed). Traefik IngressRoute
# (public) on both web + websecure. For a registry-image deploy instead, build
# web/Dockerfile and adapt this manifest's container image + remove the clone.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cc-turtles-data
  namespace: devops
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is RWO, so the old pod must
  # release the volume BEFORE the new one mounts it. A rolling surge would
  # start the new pod first and deadlock on a Multi-Attach error whenever
  # it lands on a different node than the old pod.
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: cc-turtles-dashboard }
  template:
    metadata:
      labels: { app: cc-turtles-dashboard }
    spec:
      containers:
        - name: dashboard
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            # run from inside the clone so the server can read
            # ../lib/version.lua (the single global version file)
            - >
              apk add --no-cache git &&
              git clone --depth 1 https://github.com/Nerodacles/cc-turtles /app/repo &&
              cd /app/repo/web &&
              npm install --omit=dev &&
              node server.js
          env:
            - { name: PORT, value: "8080" }
            - { name: STALE_MS, value: "20000" }
            # Persisted turtle logs: one file per day under /data/logs,
            # files older than this many days are auto-deleted.
            - { name: LOG_RETAIN_DAYS, value: "7" }
            # Command gate: browsers must enter this key to issue
            # commands. Sourced from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-cmdkey \
            #     --from-literal=key=YOUR-KEY
            # Absent secret = no gate (optional: true).
            - name: CMD_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-cmdkey
                  key: key
                  optional: true
            # Read-only API gate: GET /api/state requires this token as
            # Bearer or ?key=. Sourced from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-readkey \
            #     --from-literal=key=YOUR-READ-KEY
            # Absent secret = read API treated as disabled (optional: true).
            - name: READ_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-readkey
                  key: key
                  optional: true
            # Bridge auth gate: the in-game bridge WebSocket must present this
            # key in its hello message or the connection is rejected. Sourced
            # from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-bridgekey \
            #     --from-literal=key=YOUR-BRIDGE-KEY
            # Absent secret = bridge endpoint open (no gate), optional: true.
            - name: BRIDGE_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-bridgekey
                  key: key
                  optional: true
            # F5: Webhook (Discord-compatible) alert URL. Sourced from a
            # Secret so the URL is never in git. Create it:
            #   kubectl -n devops create secret generic cc-turtles-webhook \
            #     --from-literal=url=https://discord.com/api/webhooks/...
            # Absent secret = webhook disabled (no-op). optional: true.
            - name: WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-webhook
                  key: url
                  optional: true
            # Absolute fuel count below which "fuel critical" fires (default 500).
            - { name: WEBHOOK_FUEL_THRESHOLD, value: "500" }
            # Silence before "offline" alert fires (default 10 min).
            - { name: WEBHOOK_STALE_MS, value: "600000" }
            # Silence before "stuck miner" alert fires (default 8 min).
            - { name: STUCK_MS, value: "480000" }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
          # Liveness: restart the pod if the Node event loop stalls (e.g. a slow
          # PVC writeFileSync) so a readiness-fail doesn't hang it forever.
          # Hits /api/health on the pod directly (no token; not via the ingress).
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 192Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cc-turtles-data
---
apiVersion: v1
kind: Service
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  selector: { app: cc-turtles-dashboard }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
---
# Traefik IngressRoute (public). WebSocket upgrades pass through the
# HTTP 'web' entrypoint transparently - no middleware needed.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  # both entrypoints: Cloudflare's WebSocket origin-pull is uncacheable
  # and rides 443 (websecure), so the route must exist there too.
  # tls:{} uses Traefik's default cert (fine with Cloudflare "Full").
  entryPoints: [web, websecure]
  routes:
    - kind: Rule
      match: Host(`turtles.infra.com.do`)
      services:
        - name: cc-turtles-dashboard
          port: 80
  tls: {}
