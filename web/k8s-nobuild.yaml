# No-build deploy: a node:22-alpine pod clones the public repo and runs
# the server (no registry/docker needed). Traefik IngressRoute (public).
# For production, build a real image (web/Dockerfile) and use k8s.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cc-turtles-data
  namespace: devops
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is RWO, so the old pod must
  # release the volume BEFORE the new one mounts it. A rolling surge would
  # start the new pod first and deadlock on a Multi-Attach error whenever
  # it lands on a different node than the old pod.
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: cc-turtles-dashboard }
  template:
    metadata:
      labels: { app: cc-turtles-dashboard }
    spec:
      containers:
        - name: dashboard
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            # run from inside the clone so the server can read
            # ../lib/version.lua (the single global version file)
            - >
              apk add --no-cache git &&
              git clone --depth 1 https://github.com/Nerodacles/cc-turtles /app/repo &&
              cd /app/repo/web &&
              npm install --omit=dev &&
              node server.js
          env:
            - { name: PORT, value: "8080" }
            - { name: STALE_MS, value: "20000" }
            # Command gate: browsers must enter this key to issue
            # commands. Sourced from a Secret (not in git) - create it:
            #   kubectl -n devops create secret generic cc-turtles-cmdkey \
            #     --from-literal=key=YOUR-KEY
            # Absent secret = no gate (optional: true).
            - name: CMD_KEY
              valueFrom:
                secretKeyRef:
                  name: cc-turtles-cmdkey
                  key: key
                  optional: true
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 192Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cc-turtles-data
---
apiVersion: v1
kind: Service
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  selector: { app: cc-turtles-dashboard }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
---
# Traefik IngressRoute (public). WebSocket upgrades pass through the
# HTTP 'web' entrypoint transparently - no middleware needed.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cc-turtles-dashboard
  namespace: devops
spec:
  # both entrypoints: Cloudflare's WebSocket origin-pull is uncacheable
  # and rides 443 (websecure), so the route must exist there too.
  # tls:{} uses Traefik's default cert (fine with Cloudflare "Full").
  entryPoints: [web, websecure]
  routes:
    - kind: Rule
      match: Host(`turtles.infra.com.do`)
      services:
        - name: cc-turtles-dashboard
          port: 80
  tls: {}
